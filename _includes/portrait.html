<a {% if include.link %}href="{{ include.link | relative_url }}"{% endif %} class="portrait" data-mini="{{ include.mini | default: false }}">

  <span class="portrait_image">
    {%- if include.image -%}
    <img src="{{ include.image | relative_url }}" onerror="this.src = '{{ placeholder }}'; this.onerror = null;">
    {%- else -%}
    <img src="{{ placeholder }}">
    {%- endif -%}
  </span>

  {%- if include.name -%}
  <span class="portrait_name">
    {{ include.name }}
  </span>
  {%- endif -%}

  {%- if include.role -%}
  <div class="portrait_role">
    {%- include role.html type=include.role text=true -%}
  </div>
  {%- endif -%}

</a>
